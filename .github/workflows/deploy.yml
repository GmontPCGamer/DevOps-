name: Deploy Innovatech — EKS

on:
  push:
    branches:
      - deploy
      - main
  workflow_dispatch:

concurrency:
  group: deploy-eks-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: innovatech-cluster
  K8S_NAMESPACE: innovatech

jobs:
  build:
    name: Compilar aplicaciones
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Compilar API Node y Frontend
        run: |
          cd api-innovatech && npm ci && npm run build --if-present
          cd ../front_despacho && npm ci && npm run build

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Compilar backends Spring Boot
        run: |
          cd back-Ventas_SpringBoot/Springboot-API-REST && chmod +x mvnw && ./mvnw -B -DskipTests package
          cd ../../back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO && chmod +x mvnw && ./mvnw -B -DskipTests package

  docker-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: front_despacho
            ecr_repo: innovatech-poc-frontend
          - service: back-ventas
            context: back-Ventas_SpringBoot/Springboot-API-REST
            ecr_repo: innovatech-poc-back-ventas
          - service: back-despachos
            context: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
            ecr_repo: innovatech-poc-back-despachos
          - service: api-node
            context: api-innovatech
            ecr_repo: innovatech-poc-api-node
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}


      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3

      - name: Build y push a ECR
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.ecr_repo }}:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.ecr_repo }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-eks:
    name: Desplegar en EKS
    runs-on: ubuntu-latest
    needs: docker-push
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}


      - uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Conectar al cluster EKS
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: kubectl apply + rollout
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          chmod +x scripts/deploy-k8s.sh
          ./scripts/deploy-k8s.sh

      - name: Resumen del despliegue
        run: |
          echo "## Despliegue EKS" >> $GITHUB_STEP_SUMMARY
          kubectl get pods,svc -n ${{ env.K8S_NAMESPACE }} >> $GITHUB_STEP_SUMMARY

  validate:
    name: Validar despliegue
    runs-on: ubuntu-latest
    needs: deploy-eks
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}


      - uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Conectar al cluster EKS
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Validar servicios
        env:
          K8S_NAMESPACE: ${{ env.K8S_NAMESPACE }}
        run: |
          chmod +x scripts/validate-deployment.sh
          ./scripts/validate-deployment.sh


