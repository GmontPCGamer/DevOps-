name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  api-innovatech:
    name: Construir API Innovatech (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Usar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Instalar y Compilar
        working-directory: api-innovatech
        run: |
          npm ci
          npm run build --if-present
      - name: Ejecutar pruebas
        working-directory: api-innovatech
        run: |
          npm test --if-present

  front-despacho:
    name: Construir Front (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Usar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Instalar y Compilar
        working-directory: front_despacho
        run: |
          npm ci
          npm run build --if-present
      - name: Ejecutar pruebas
        working-directory: front_despacho
        run: npm test --if-present

  back-ventas:
    name: Construir Backend Ventas (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Construir con Maven
        working-directory: back-Ventas_SpringBoot/Springboot-API-REST
        run: |
          chmod +x mvnw || true
          ./mvnw -B -DskipTests package

  back-despachos:
    name: Construir Backend Despachos (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Construir con Maven
        working-directory: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: |
          chmod +x mvnw || true
          ./mvnw -B -DskipTests package
