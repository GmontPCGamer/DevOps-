# ── Backend Despachos — Service ───────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: back-despachos
  namespace: innovatech
  labels:
    app: back-despachos
    tier: backend
spec:
  selector:
    app: back-despachos
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP

---
# ── Backend Despachos — HorizontalPodAutoscaler ───────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: back-despachos-hpa
  namespace: innovatech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: back-despachos
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
