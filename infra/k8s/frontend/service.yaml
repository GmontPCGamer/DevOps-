apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: innovatech
  labels:
    app: frontend
    tier: frontend
  annotations:
    # Indica a AWS que use un Classic Load Balancer (compatible con AWS Academy)
    service.beta.kubernetes.io/aws-load-balancer-type: "classic"
spec:
  selector:
    app: frontend
  ports:
    - port: 80          # puerto p├║blico del Load Balancer
      targetPort: 80    # puerto interno del contenedor Nginx
  type: LoadBalancer    # expone el servicio fuera del cl├║ster v├¡a AWS ELB
