# ÔöÇÔöÇ Secret ÔÇö Credenciales de base de datos ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
# Almacena datos sensibles en base64.
# IMPORTANTE: en producci├│n real usar AWS Secrets Manager o Sealed Secrets.
#
# C├│mo generar los valores base64 en terminal:
#   echo -n "root1234"   | base64   ÔåÆ  cm9vdDEyMzQ=
#   echo -n "innovatech" | base64   ÔåÆ  aW5ub3ZhdGVjaA==
#   echo -n "innova1234" | base64   ÔåÆ  aW5ub3ZhMTIzNA==
#
apiVersion: v1
kind: Secret
metadata:
  name: innovatech-db-secret
  namespace: innovatech
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: cm9vdDEyMzQ=    # root1234
  MYSQL_PASSWORD: aW5ub3ZhMTIzNA==     # innova1234
  DB_PASSWORD: aW5ub3ZhMTIzNA==        # innova1234 (usado por Spring Boot y Node)
